format = """
$username\
$directory\
$git_branch\
$git_status\
$time
$character"""

[username]
show_always = true
style_user = "bold #ffffff"
style_root = "bold #fdfdfdaf"
format = "[╭─ $user]($style) "

[directory]
style = "bold #ccd3d7"
truncation_length = 3
format = "[ $path]($style) "

[git_branch]
style = "bold #ffffff"
format = "[ $branch]($style)"

[git_status]
style = "bold #a6e3a1"
format = " [$all_status$ahead_behind]($style) "

[time]
disabled = false
time_format = "%H:%M"
style = "bold #a6abb4"
format = "[ $time]($style) "

[character]
success_symbol = "[╰─❯]( #ffffff )"
error_symbol = "[╰─✗]( #a85c5c)"
